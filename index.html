<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cofre ADSO - Con Luces</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-entity light="type: ambient; color: #FFF; intensity: 1.0"></a-entity>
    
    <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 2 1"></a-entity>

    <a-entity camera>
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactuable"></a-entity>
    </a-entity>

    <a-marker preset="hiro">
      <a-gltf-model 
        src="Mimic.glb" 
        class="interactuable"
        scale="0.5 0.5 0.5" 
        position="0 0 0"
        onclick="lanzarTrivia()">
      </a-gltf-model>
    </a-marker>
  </a-scene>
</body>
</html>
