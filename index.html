<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cofre ADSO - Letras AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-entity light="type: ambient; color: #FFF; intensity: 1.0"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 2 1"></a-entity>

    <a-entity camera>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactuable"></a-entity>
    </a-entity>

    <a-marker type="pattern" url="A.patt">
        <a-gltf-model src="Mimic.glb" 
                      class="interactuable"
                      scale="0.5 0.5 0.5" 
                      position="0 0 0">
        </a-gltf-model>
    </a-marker>

    <a-marker type="pattern" url="B.patt">
        <a-gltf-model src="Serpiente.glb" 
                      class="interactuable"
                      scale="0.5 0.5 0.5" 
                      position="0 0.5 0">
        </a-gltf-model>
    </a-marker>

    <a-marker type="pattern" url="C.patt">
        <a-box color="#4CC3D9" class="interactuable" scale="0.5 0.5 0.5"></a-box>
    </a-marker>

  </a-scene>
</body>
</html>
