<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR con Patrones Personalizados</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: true;">
    
    <a-marker type="pattern" url="marcadores/Serpiente.patt">
      <a-gltf-model 
        src="Serpiente.glb" 
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-marker>

    <a-marker type="pattern" url="marcadores/marcador2.patt">
      <a-gltf-model 
        src="objeto2.glb" 
        scale="0.5 0.5 0.5">
      </a-gltf-model>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
