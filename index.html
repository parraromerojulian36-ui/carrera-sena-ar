<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-entity camera>
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactuable"></a-entity>
    </a-entity>

    <a-marker preset="hiro">
      <a-gltf-model 
        src="cofre.glb" 
        class="interactuable"
        scale="0.5 0.5 0.5" 
        position="0 0 0"
        onclick="lanzarTrivia()">
      </a-gltf-model>
    </a-marker>
  </a-scene>

  <script>
    function lanzarTrivia() {
      // Pregunta simple de ejemplo
      alert("¡Tesoro encontrado! Pregunta ADSO: ¿Cuál es el lenguaje de marcado que estamos usando en este archivo?");
    }
  </script>
</body>
</html>
